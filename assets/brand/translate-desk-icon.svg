<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Translate Desk app icon</title>
  <desc id="desc">A calm Windows desktop translation icon with two document panels and a bidirectional translation arrow.</desc>
