version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Taipei
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      vite:
        patterns:
          - vite
          - "@vitejs/*"
      electron:
        patterns:
          - electron
      react:
        patterns:
          - react
          - react-dom
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: Asia/Taipei
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
