name: Bug report
description: Report a reproducible problem in Translate Desk.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest steps that reproduce the issue.
      placeholder: |
        1. Open ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      placeholder: "0.x.x"
    validations:
      required: false
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Windows desktop app
        - Local development server
        - Other
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Do not attach secrets, private OCR samples, or sensitive screenshots.
    validations:
      required: false
