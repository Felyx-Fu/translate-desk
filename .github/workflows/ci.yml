name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check Electron main process syntax
        run: node --check dist-electron\main.cjs

      - name: Check Electron preload syntax
        run: node --check dist-electron\preload.cjs

      - name: Electron smoke test
        run: .\node_modules\.bin\electron.cmd .
        env:
          ELECTRON_SMOKE_TEST: "1"

      - name: Audit production dependencies
        run: npm audit --audit-level=moderate --omit=dev
